<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K Shakil Rana - Notepad </title>
    
    <!-- External Libraries -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Telegram Web App SDK for Bot Integration -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        /* CSS Variables - Premium Blue & White Theme */
        :root {
            --bg-body: #F4F7FB;
            --bg-panel: #FFFFFF;
            --primary: #0052FF;
            --primary-hover: #0043D1;
            --primary-light: #EBF1FF;
            --text-main: #0F172A;
            --text-muted: #64748B;
            --border: #E2E8F0;
            --danger: #EF4444;
            --warning: #F59E0B;
            --success: #10B981;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.05);
            --shadow-lg: 0 10px 25px -5px rgba(0,0,0,0.1);
            --radius: 12px;
        }

        /* Base Reset */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-body); color: var(--text-main); height: 100vh; overflow: hidden; display: flex; }
        button { cursor: pointer; border: none; background: none; color: inherit; outline: none; transition: 0.2s; }
        input, select { font-family: inherit; outline: none; text-decoration: none; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94A3B8; }

        /* --- 3-Pane Layout --- */
        
        /* 1. Sidebar */
        .sidebar { width: 240px; background: var(--bg-panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 24px 16px; z-index: 10; flex-shrink: 0; }
        .logo { font-size: 20px; font-weight: 700; color: var(--text-main); margin-bottom: 30px; display: flex; align-items: center; gap: 10px; padding: 0 10px; }
        .logo i { color: var(--primary); font-size: 24px; }
        
        .nav-label { font-size: 11px; text-transform: uppercase; color: var(--text-muted); font-weight: 600; letter-spacing: 1px; margin: 15px 0 5px 10px; }
        .nav-item { padding: 10px 12px; border-radius: 8px; display: flex; align-items: center; gap: 12px; font-weight: 500; font-size: 14px; color: var(--text-muted); margin-bottom: 4px; text-decoration: none; }
        .nav-item:hover { background: var(--bg-body); color: var(--text-main); }
        .nav-item.active { background: var(--primary-light); color: var(--primary); font-weight: 600; }
        .nav-item i { width: 18px; text-align: center; font-size: 16px; }
        .sidebar-spacer { flex-grow: 1; }

        /* Unique Telegram Button Design */
        .telegram-btn { margin-top: 10px; background: #F8FAFC; border: 1px dashed #0088cc; color: #0088cc; justify-content: center; font-weight: 600; transition: all 0.3s ease; display: flex; align-items: center; gap: 8px; }
        .telegram-btn:hover { background: #E6F3FA; border-color: #0088cc; transform: translateY(-2px); box-shadow: var(--shadow-sm); color: #0088cc; }
        .telegram-btn i { color: #0088cc; font-size: 18px; }

        /* Download System Button */
        .download-btn { color: var(--primary); background: var(--primary-light); font-weight: 600; }
        .download-btn:hover { background: var(--primary); color: white; }

        /* Download Modal Styles */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(4px); display: none; justify-content: center; align-items: center; z-index: 9999; }
        .modal-content { background: var(--bg-panel); width: 90%; max-width: 400px; border-radius: 16px; padding: 24px; box-shadow: var(--shadow-lg); animation: slideUp 0.3s ease; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-header h3 { font-size: 18px; font-weight: 700; color: var(--text-main); }
        .close-modal-btn { background: var(--bg-body); width: 32px; height: 32px; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: var(--text-muted); }
        .close-modal-btn:hover { background: var(--danger); color: white; }
        
        .download-options { display: flex; flex-direction: column; gap: 10px; }
        .dl-option-btn { background: var(--bg-body); border: 1px solid var(--border); padding: 12px 16px; border-radius: 8px; display: flex; align-items: center; gap: 12px; font-weight: 500; font-size: 14px; color: var(--text-main); transition: 0.2s; }
        .dl-option-btn:hover { background: var(--primary-light); border-color: var(--primary); color: var(--primary); transform: translateX(5px); }
        .dl-option-btn i { font-size: 16px; color: var(--primary); }

        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* 2. Note List Pane */
        .list-pane { width: 320px; background: var(--bg-body); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
        .list-header { padding: 20px 20px 10px 20px; }
        .list-title-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .list-title { font-size: 18px; font-weight: 600; }
        
        .create-btn { background: var(--primary); color: white; width: 36px; height: 36px; border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: var(--shadow-sm); }
        .create-btn:hover { background: var(--primary-hover); transform: translateY(-1px); }

        .search-box { background: var(--bg-panel); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; display: flex; align-items: center; gap: 10px; margin-bottom: 10px; box-shadow: var(--shadow-sm); }
        .search-box i { color: var(--text-muted); }
        .search-box input { border: none; background: none; width: 100%; font-size: 14px; color: var(--text-main); }

        .notes-list { flex-grow: 1; overflow-y: auto; padding: 10px 20px 20px 20px; display: flex; flex-direction: column; gap: 10px; }
        
        /* Note Card */
        .note-card { background: var(--bg-panel); padding: 16px; border-radius: var(--radius); cursor: pointer; border: 1px solid transparent; box-shadow: var(--shadow-sm); transition: 0.2s; position: relative; overflow: hidden; }
        .note-card:hover { border-color: var(--border); box-shadow: var(--shadow-md); }
        .note-card.selected { background: var(--primary-light); border-color: var(--primary); }
        
        .note-card-header { display: flex; justify-content: space-between; margin-bottom: 6px; }
        .note-card-title { font-weight: 600; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 20px; }
        .note-card-preview { font-size: 13px; color: var(--text-muted); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 10px; line-height: 1.5; }
        .note-card-meta { font-size: 11px; color: #94A3B8; font-weight: 500; }
        
        .pin-indicator { position: absolute; top: 16px; right: 16px; color: var(--primary); font-size: 12px; }

        /* 3. Editor Pane */
        .editor-pane { flex-grow: 1; background: var(--bg-panel); display: flex; flex-direction: column; position: relative; }
        
        /* Blank State */
        .blank-state { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: var(--bg-body); z-index: 5; color: var(--text-muted); text-align: center; }
        .blank-state i { font-size: 60px; color: #CBD5E1; margin-bottom: 20px; }
        .blank-state h2 { font-size: 20px; color: var(--text-main); margin-bottom: 10px; }
        .blank-state-btn { margin-top: 20px; padding: 10px 20px; background: var(--primary); color: white; border-radius: 8px; font-weight: 500; }

        /* Editor Header (Toolbar & Sync Status) */
        .editor-header { padding: 15px 30px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: var(--bg-panel); }
        
        .editor-actions { display: flex; gap: 8px; }
        .action-btn { width: 32px; height: 32px; border-radius: 6px; display: flex; justify-content: center; align-items: center; color: var(--text-muted); border: 1px solid transparent; }
        .action-btn:hover { background: var(--bg-body); color: var(--text-main); border-color: var(--border); }
        .action-btn.active { color: var(--primary); background: var(--primary-light); }

        .sync-status { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 500; color: var(--text-muted); padding: 5px 12px; border-radius: 20px; background: var(--bg-body); }
        .sync-status.syncing { color: var(--primary); }
        .sync-status.saved { color: var(--success); }
        
        /* Editor Content Area */
        .editor-body { flex-grow: 1; padding: 40px 60px; overflow-y: auto; }
        
        .editor-title-input { width: 100%; font-size: 32px; font-weight: 700; color: var(--text-main); border: none; background: none; margin-bottom: 20px; padding: 0; }
        .editor-title-input::placeholder { color: #CBD5E1; }
        
        .editor-content { min-height: 60vh; font-size: 16px; line-height: 1.7; color: #334155; outline: none; }
        .editor-content[placeholder]:empty:before { content: attr(placeholder); color: #94A3B8; pointer-events: none; display: block; }
        .editor-content img { max-width: 100%; border-radius: 8px; margin: 10px 0; border: 1px solid var(--border); box-shadow: var(--shadow-sm); }
        
        .editor-tags-input { width: 100%; border: none; font-size: 13px; color: var(--primary); background: transparent; margin-top: 40px; padding-top: 20px; border-top: 1px dashed var(--border); }
        .editor-tags-input::placeholder { color: #94A3B8; }

        /* Formatting Toolbar */
        .format-toolbar { display: flex; gap: 5px; padding: 10px 30px; border-bottom: 1px solid var(--border); background: #FAFCFF; flex-wrap: wrap; }
        .format-btn { padding: 6px 10px; border-radius: 6px; font-size: 14px; color: var(--text-muted); }
        .format-btn:hover { background: var(--primary-light); color: var(--primary); }
        .format-divider { width: 1px; background: var(--border); margin: 0 5px; }

        /* Mobile Adjustments */
        .mobile-back, .mobile-menu-btn { display: none; }

        @media (max-width: 900px) {
            .sidebar { position: fixed; left: -100%; height: 100%; transition: 0.3s; box-shadow: var(--shadow-md); }
            .sidebar.open { left: 0; }
            
            .list-pane { width: 100%; }
            .editor-pane { position: fixed; top: 0; left: 100%; width: 100%; height: 100%; transition: 0.3s; z-index: 20; }
            .editor-pane.open { left: 0; }
            
            .mobile-back, .mobile-menu-btn { display: flex; margin-right: 10px; }
            .editor-body { padding: 20px; }
            .editor-title-input { font-size: 24px; }
            .format-toolbar { padding: 10px; overflow-x: auto; flex-wrap: nowrap; }
        }
    </style>
</head>
<body>

    <!-- Download Modal System -->
    <div class="modal-overlay" id="downloadModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Download System</h3>
                <button class="close-modal-btn" onclick="toggleDownloadModal(false)">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 15px;">
                Select a category to download. Your backup will be downloaded here and sent to your Telegram bot.
            </p>
            <div class="download-options">
                <button class="dl-option-btn" onclick="executeDownload('all')">
                    <i class="fa-solid fa-layer-group"></i> All Notes
                </button>
                <button class="dl-option-btn" onclick="executeDownload('pinned')">
                    <i class="fa-solid fa-thumbtack"></i> Pinned Notes
                </button>
                <button class="dl-option-btn" onclick="executeDownload('favorites')">
                    <i class="fa-solid fa-heart"></i> Favorite Notes
                </button>
                <button class="dl-option-btn" onclick="executeDownload('work')">
                    <i class="fa-solid fa-briefcase"></i> Work Notes
                </button>
                <button class="dl-option-btn" onclick="executeDownload('personal')">
                    <i class="fa-solid fa-user"></i> Personal Notes
                </button>
            </div>
        </div>
    </div>

    <!-- Pane 1: Sidebar -->
    <nav class="sidebar" id="sidebar">
        <div class="logo">
            <i class="fa-solid fa-feather"></i> Notepad
        </div>
        
        <div class="nav-label">Menu</div>
        <button class="nav-item active" onclick="setFilter('all', this)">
            <i class="fa-solid fa-layer-group"></i> All Notes
        </button>
        <button class="nav-item" onclick="setFilter('pinned', this)">
            <i class="fa-solid fa-thumbtack"></i> Pinned
        </button>
        <button class="nav-item" onclick="setFilter('favorites', this)">
            <i class="fa-solid fa-heart"></i> Favorites
        </button>
        
        <div class="nav-label">Organization</div>
        <button class="nav-item" onclick="setFilter('work', this)">
            <i class="fa-solid fa-briefcase"></i> Work
        </button>
        <button class="nav-item" onclick="setFilter('personal', this)">
            <i class="fa-solid fa-user"></i> Personal
        </button>
        
        <!-- Advanced Download System Button -->
        <button class="nav-item download-btn" onclick="toggleDownloadModal(true)" style="margin-top: 10px;">
            <i class="fa-solid fa-cloud-arrow-down"></i> Download System
        </button>
        
        <div class="sidebar-spacer"></div>
        
        <!-- Telegram Channel Button -->
        <a href="https://t.me/TechCommunitys" target="_blank" class="nav-item telegram-btn" title="Join our Telegram Channel">
            <i class="fa-brands fa-telegram"></i> Telegram Channel
        </a>
    </nav>

    <!-- Pane 2: Note List -->
    <div class="list-pane">
        <div class="list-header">
            <div class="list-title-row">
                <div style="display: flex; align-items: center;">
                    <button class="mobile-menu-btn action-btn" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
                    <span class="list-title" id="listTitle">All Notes</span>
                </div>
                <button class="create-btn" onclick="createNewNote()" title="New Note">
                    <i class="fa-solid fa-plus"></i>
                </button>
            </div>
            <div class="search-box">
                <i class="fa-solid fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search notes..." oninput="renderNotes()">
            </div>
        </div>
        <div class="notes-list" id="notesList">
            <!-- Notes injected here via JS -->
        </div>
    </div>

    <!-- Pane 3: Editor -->
    <div class="editor-pane" id="editorPane">
        
        <!-- Blank State -->
        <div class="blank-state" id="blankState">
            <i class="fa-regular fa-file-lines"></i>
            <h2>Select a note to view</h2>
            <p>Or create a new note to start capturing your ideas.</p>
            <button class="blank-state-btn" onclick="createNewNote()">Create New Note</button>
        </div>

        <!-- Editor Toolbar -->
        <div class="editor-header">
            <div style="display: flex; align-items: center;">
                <button class="mobile-back action-btn" onclick="closeEditorMobile()"><i class="fa-solid fa-arrow-left"></i></button>
                <div class="editor-actions">
                    <button class="action-btn" id="btnPin" onclick="toggleActiveNoteProp('isPinned')" title="Pin Note"><i class="fa-solid fa-thumbtack"></i></button>
                    <button class="action-btn" id="btnFav" onclick="toggleActiveNoteProp('isFavorite')" title="Favorite"><i class="fa-solid fa-heart"></i></button>
                    <button class="action-btn" onclick="deleteActiveNote()" title="Delete" style="color: var(--danger);"><i class="fa-solid fa-trash"></i></button>
                </div>
            </div>
            
            <!-- Real-time Sync Indicator -->
            <div class="sync-status" id="syncStatus">
                <i class="fa-solid fa-cloud-check"></i> Saved
            </div>
        </div>

        <div class="format-toolbar">
            <button class="format-btn" onclick="formatText('bold')" title="Bold"><i class="fa-solid fa-bold"></i></button>
            <button class="format-btn" onclick="formatText('italic')" title="Italic"><i class="fa-solid fa-italic"></i></button>
            <button class="format-btn" onclick="formatText('underline')" title="Underline"><i class="fa-solid fa-underline"></i></button>
            <div class="format-divider"></div>
            <button class="format-btn" onclick="formatText('formatBlock', 'H1')" title="Heading 1">H1</button>
            <button class="format-btn" onclick="formatText('formatBlock', 'H2')" title="Heading 2">H2</button>
            <div class="format-divider"></div>
            <button class="format-btn" onclick="formatText('insertUnorderedList')" title="Bullet List"><i class="fa-solid fa-list-ul"></i></button>
            <button class="format-btn" onclick="formatText('insertOrderedList')" title="Numbered List"><i class="fa-solid fa-list-ol"></i></button>
            <div class="format-divider"></div>
            
            <!-- Direct Image Upload System -->
            <button class="format-btn" onclick="triggerImageUpload()" title="Upload Image">
                <i class="fa-regular fa-image"></i>
            </button>
            <!-- Hidden Input for selecting image files from device -->
            <input type="file" id="imageUploadInput" accept="image/*" style="display: none;" onchange="handleImageUpload(event)">
            
            <button class="format-btn" onclick="insertLinkPrompt()" title="Insert Link"><i class="fa-solid fa-link"></i></button>
        </div>

        <!-- Content Area -->
        <div class="editor-body">
            <input type="text" id="editorTitle" class="editor-title-input" placeholder="Note Title">
            <div id="editorContent" class="editor-content" contenteditable="true" placeholder="Start typing here..."></div>
            <input type="text" id="editorTags" class="editor-tags-input" placeholder="# Add tags separated by comma (e.g. work, ideas)">
        </div>
    </div>

    <script>
        // Initialize Telegram Web App SDK
        const tg = window.Telegram.WebApp;
        tg.expand(); // Expand Web App to full height

        // Data structure
        let notes = JSON.parse(localStorage.getItem('aeronote_data')) ||[];
        let activeNoteId = null;
        let currentFilter = 'all';
        let typingTimer;
        const typingDelay = 800; // ms to wait after typing stops before saving

        // DOM Elements
        const notesListEl = document.getElementById('notesList');
        const searchInput = document.getElementById('searchInput');
        const blankState = document.getElementById('blankState');
        const editorTitle = document.getElementById('editorTitle');
        const editorContent = document.getElementById('editorContent');
        const editorTags = document.getElementById('editorTags');
        const syncStatus = document.getElementById('syncStatus');
        const editorPane = document.getElementById('editorPane');
        const sidebar = document.getElementById('sidebar');
        const downloadModal = document.getElementById('downloadModal');

        // Initial setup
        window.onload = () => {
            if(notes.length === 0) {
                // Add a welcome note
                notes.push({
                    id: Date.now().toString(),
                    title: "Welcome to AeroNote! 🚀",
                    content: "AeroNote is a premium, beautifully designed workspace.<br><br><b>Features:</b><ul><li><b>No Save Button:</b> Everything saves automatically.</li><li><b>Telegram Bot Integration:</b> Download notes directly and receive backups directly to your Telegram ID automatically.</li><li><b>Direct Image Upload:</b> Easily insert images.</li><li><b>3-Pane Layout:</b> Navigate smoothly.</li></ul><br>Enjoy your clean workspace!",
                    tags: "welcome, intro",
                    isPinned: true,
                    isFavorite: true,
                    updatedAt: Date.now()
                });
                saveToLocalStorage();
            }
            renderNotes();
            setupAutoSave();
        };

        // --- Core Functions ---

        function renderNotes() {
            notesListEl.innerHTML = '';
            const query = searchInput.value.toLowerCase();
            
            let filtered = notes.filter(n => {
                const matchSearch = n.title.toLowerCase().includes(query) || n.content.toLowerCase().includes(query) || n.tags.toLowerCase().includes(query);
                if (!matchSearch) return false;

                if (currentFilter === 'pinned') return n.isPinned;
                if (currentFilter === 'favorites') return n.isFavorite;
                if (currentFilter === 'work' || currentFilter === 'personal') return n.tags.toLowerCase().includes(currentFilter);
                return true;
            });

            filtered.sort((a, b) => {
                if(a.isPinned && !b.isPinned) return -1;
                if(!a.isPinned && b.isPinned) return 1;
                return b.updatedAt - a.updatedAt;
            });

            if(filtered.length === 0) {
                let emptyMsg = "No notes found.";
                notesListEl.innerHTML = `<div style="text-align:center; padding: 20px; color: var(--text-muted); font-size: 13px;">${emptyMsg}</div>`;
            }

            filtered.forEach(note => {
                const div = document.createElement('div');
                div.className = `note-card ${note.id === activeNoteId ? 'selected' : ''}`;
                div.onclick = () => openNote(note.id);
                
                const temp = document.createElement('div');
                temp.innerHTML = note.content;
                const preview = temp.textContent || temp.innerText || "No additional text...";

                const date = new Date(note.updatedAt).toLocaleDateString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit' });

                div.innerHTML = `
                    ${note.isPinned ? '<i class="fa-solid fa-thumbtack pin-indicator"></i>' : ''}
                    <div class="note-card-header">
                        <div class="note-card-title">${note.title || 'Untitled Note'}</div>
                    </div>
                    <div class="note-card-preview">${preview}</div>
                    <div class="note-card-meta">${date}</div>
                `;
                notesListEl.appendChild(div);
            });
        }

        function createNewNote() {
            const newNote = {
                id: Date.now().toString(),
                title: "",
                content: "",
                tags: "",
                isPinned: false,
                isFavorite: false,
                updatedAt: Date.now()
            };
            notes.unshift(newNote);
            saveToLocalStorage();
            openNote(newNote.id);
            editorTitle.focus();
        }

        function openNote(id) {
            activeNoteId = id;
            const note = notes.find(n => n.id === id);
            
            if(!note) return;

            blankState.style.display = 'none';
            editorTitle.value = note.title;
            editorContent.innerHTML = note.content;
            editorTags.value = note.tags;
            
            document.getElementById('btnPin').className = `action-btn ${note.isPinned ? 'active' : ''}`;
            document.getElementById('btnFav').className = `action-btn ${note.isFavorite ? 'active' : ''}`;

            renderNotes(); 
            
            if(window.innerWidth <= 900) {
                editorPane.classList.add('open');
            }
        }

        // --- Real-Time Auto Save Logic ---

        function setupAutoSave() {
            const fields = [editorTitle, editorContent, editorTags];
            fields.forEach(field => {
                field.addEventListener('input', () => {
                    if(!activeNoteId) return;
                    
                    syncStatus.className = 'sync-status syncing';
                    syncStatus.innerHTML = '<i class="fa-solid fa-cloud-arrow-up fa-fade"></i> Saving...';

                    clearTimeout(typingTimer);
                    typingTimer = setTimeout(saveActiveNoteData, typingDelay);
                });
            });
        }

        function saveActiveNoteData() {
            if(!activeNoteId) return;
            const noteIndex = notes.findIndex(n => n.id === activeNoteId);
            if(noteIndex === -1) return;

            notes[noteIndex].title = editorTitle.value;
            notes[noteIndex].content = editorContent.innerHTML;
            notes[noteIndex].tags = editorTags.value;
            notes[noteIndex].updatedAt = Date.now();

            saveToLocalStorage();
            
            syncStatus.className = 'sync-status saved';
            syncStatus.innerHTML = '<i class="fa-solid fa-cloud-check"></i> Saved';
            
            renderNotes();
        }

        function saveToLocalStorage() {
            localStorage.setItem('aeronote_data', JSON.stringify(notes));
        }

        // --- Actions ---

        function toggleActiveNoteProp(prop) {
            if(!activeNoteId) return;
            const note = notes.find(n => n.id === activeNoteId);
            note[prop] = !note[prop];
            note.updatedAt = Date.now();
            saveToLocalStorage();
            openNote(activeNoteId);
        }

        function deleteActiveNote() {
            if(!activeNoteId) return;
            if(confirm("Are you sure you want to delete this note?")) {
                notes = notes.filter(n => n.id !== activeNoteId);
                saveToLocalStorage();
                activeNoteId = null;
                blankState.style.display = 'flex';
                renderNotes();
                if(window.innerWidth <= 900) closeEditorMobile();
            }
        }

        function setFilter(filter, btnElement) {
            currentFilter = filter;
            document.querySelectorAll('.sidebar .nav-item:not(.download-btn):not(.telegram-btn)').forEach(el => el.classList.remove('active'));
            if(btnElement) btnElement.classList.add('active');
            
            const titles = {
                'all': 'All Notes', 'pinned': 'Pinned Notes', 'favorites': 'Favorites', 
                'work': 'Work Notes', 'personal': 'Personal Notes'
            };
            document.getElementById('listTitle').innerText = titles[filter] || 'Notes';
            
            renderNotes();
            if(window.innerWidth <= 900) toggleSidebar();
        }

        // --- Rich Text Formatting & Direct Image Upload ---
        
        function formatText(command, value = null) {
            document.execCommand(command, false, value);
            editorContent.focus();
            syncStatus.className = 'sync-status syncing';
            syncStatus.innerHTML = '<i class="fa-solid fa-cloud-arrow-up fa-fade"></i> Saving...';
            clearTimeout(typingTimer);
            typingTimer = setTimeout(saveActiveNoteData, typingDelay);
        }

        function insertLinkPrompt() {
            const url = prompt("Enter link URL (e.g., https://google.com):");
            if(url) formatText('createLink', url);
        }

        function triggerImageUpload() {
            document.getElementById('imageUploadInput').click();
        }

        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    formatText('insertImage', e.target.result);
                };
                reader.readAsDataURL(file);
            }
            event.target.value = '';
        }

        // --- Mobile Specific ---

        function toggleSidebar() {
            sidebar.classList.toggle('open');
        }

        function closeEditorMobile() {
            editorPane.classList.remove('open');
            activeNoteId = null;
            renderNotes();
        }

        // --- NEW: Advanced Download System (Telegram Bot Integration) ---
        
        function toggleDownloadModal(show) {
            downloadModal.style.display = show ? 'flex' : 'none';
        }

        async function executeDownload(category) {
            // Get Telegram UID if available (Default to dummy if outside Telegram)
            let tgUid = null;
            if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                tgUid = tg.initDataUnsafe.user.id;
            }

            // Filter notes based on selected category
            let exportDataArray =[];
            if(category === 'all') exportDataArray = notes;
            else if(category === 'pinned') exportDataArray = notes.filter(n => n.isPinned);
            else if(category === 'favorites') exportDataArray = notes.filter(n => n.isFavorite);
            else if(category === 'work' || category === 'personal') exportDataArray = notes.filter(n => n.tags.toLowerCase().includes(category));

            if(exportDataArray.length === 0) {
                alert("No notes found in this category to download!");
                return;
            }

            // Prepare Final Data Object
            const finalExportData = {
                downloader_telegram_uid: tgUid || "Web_User",
                download_category: category,
                download_date: new Date().toLocaleString(),
                total_notes: exportDataArray.length,
                notes: exportDataArray
            };

            const jsonString = JSON.stringify(finalExportData, null, 2);

            // 1. Force Download file locally (No redirection)
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(jsonString);
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", `AeroNote_${category}_backup.json`);
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();

            // 2. Send Background notification & file to Telegram Bot
            if (tgUid) {
                const botToken = "8773835943:AAGW3b1Dqr_OuenlAGkjCn_IwuFpWs7DmPc";
                const message = `✅ *AeroNote Backup Successful!*\n\n📂 Category: ${category}\n📝 Total Notes: ${exportDataArray.length}\n👤 UID: ${tgUid}\n📅 Date: ${new Date().toLocaleString()}`;
                
                try {
                    // Send text message to user's Telegram
                    await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: tgUid,
                            text: message,
                            parse_mode: 'Markdown'
                        })
                    });

                    // Send the backup file to user's Telegram as a Document
                    const blob = new Blob([jsonString], { type: 'application/json' });
                    const formData = new FormData();
                    formData.append('chat_id', tgUid);
                    formData.append('document', blob, `AeroNote_${category}_backup.json`);
                    formData.append('caption', `Here is your requested backup file for category: ${category}`);

                    await fetch(`https://api.telegram.org/bot${botToken}/sendDocument`, {
                        method: 'POST',
                        body: formData
                    });
                } catch (error) {
                    console.error("Failed to send data to Telegram bot", error);
                }
            }

            // Close modal and show success
            toggleDownloadModal(false);
            
            if(tg.showAlert) {
                tg.showAlert(`Successfully Downloaded!\nFile saved to your device and sent to your Telegram Inbox.`);
            } else {
                alert(`Successfully Downloaded!\nFile saved to your device and sent to your Telegram Inbox.`);
            }
        }

    </script>
</body>
</html>
