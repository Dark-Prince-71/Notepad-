<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AeroNote - Simple Notepad</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --bg-page: #F4F7FB;
            --bg-panel: #FFFFFF;
            --primary: #0052FF;
            --primary-hover: #0043D1;
            --primary-light: #EBF1FF;
            --text-main: #0F172A;
            --text-muted: #64748B;
            --border: #E2E8F0;
            --danger: #EF4444;
            --success: #10B981;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.05);
            --radius-card: 14px;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-page);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }
        button { cursor: pointer; border: none; background: none; }
        input, select { font-family: inherit; outline: none; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 10px; }

        .app-container {
            display: flex;
            width: 100%;
            height: 100%;
        }
        .sidebar {
            width: 260px;
            background: var(--bg-panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 24px 16px;
            flex-shrink: 0;
            z-index: 10;
        }
        .logo {
            font-size: 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 30px;
            padding: 0 10px;
        }
        .logo i { color: var(--primary); font-size: 24px; }
        .nav-label {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 600;
            letter-spacing: 1px;
            margin: 15px 0 5px 10px;
        }
        .nav-item {
            padding: 10px 12px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 4px;
            width: 100%;
            text-align: left;
            background: none;
            border: none;
            cursor: pointer;
        }
        .nav-item:hover { background: var(--bg-page); color: var(--text-main); }
        .nav-item.active {
            background: var(--primary-light);
            color: var(--primary);
            font-weight: 600;
        }
        .nav-item i { width: 18px; text-align: center; font-size: 16px; }
        .sidebar-spacer { flex-grow: 1; }
        .backup-btns {
            display: flex;
            gap: 8px;
            margin: 12px 0;
        }
        .backup-btn {
            flex: 1;
            background: var(--bg-page);
            padding: 6px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
        }
        .list-pane {
            width: 320px;
            background: var(--bg-page);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        .list-header {
            padding: 20px 20px 10px 20px;
        }
        .list-title-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .list-title {
            font-size: 18px;
            font-weight: 600;
        }
        .create-btn {
            background: var(--primary);
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .create-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }
        .search-box {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 12px;
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        .search-box input {
            border: none;
            background: none;
            width: 100%;
            font-size: 14px;
        }
        .notes-list {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .note-card {
            background: var(--bg-panel);
            padding: 16px;
            border-radius: var(--radius-card);
            cursor: pointer;
            border: 1px solid transparent;
            box-shadow: var(--shadow-sm);
            position: relative;
        }
        .note-card:hover {
            border-color: var(--border);
            box-shadow: var(--shadow-md);
        }
        .note-card.selected {
            background: var(--primary-light);
            border-color: var(--primary);
        }
        .note-card-title {
            font-weight: 600;
            font-size: 15px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding-right: 20px;
        }
        .note-card-preview {
            font-size: 13px;
            color: var(--text-muted);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 10px;
        }
        .note-card-meta {
            font-size: 11px;
            color: #94A3B8;
        }
        .pin-indicator {
            position: absolute;
            top: 16px;
            right: 16px;
            color: var(--primary);
            font-size: 12px;
        }
        .editor-pane {
            flex-grow: 1;
            background: var(--bg-panel);
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .blank-state {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: var(--bg-page);
            z-index: 5;
            text-align: center;
        }
        .blank-state i {
            font-size: 60px;
            color: #CBD5E1;
            margin-bottom: 20px;
        }
        .blank-state h2 {
            font-size: 20px;
            margin-bottom: 10px;
        }
        .blank-state-btn {
            margin-top: 20px;
            padding: 10px 20px;
            background: var(--primary);
            color: white;
            border-radius: 8px;
        }
        .editor-header {
            padding: 15px 30px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .editor-actions {
            display: flex;
            gap: 8px;
        }
        .action-btn {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            border: 1px solid transparent;
        }
        .action-btn:hover {
            background: var(--bg-page);
            border-color: var(--border);
        }
        .action-btn.active {
            color: var(--primary);
            background: var(--primary-light);
        }
        .sync-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
            padding: 5px 12px;
            border-radius: 20px;
            background: var(--bg-page);
        }
        .format-toolbar {
            display: flex;
            gap: 5px;
            padding: 10px 30px;
            border-bottom: 1px solid var(--border);
            background: #FAFCFF;
            flex-wrap: wrap;
        }
        .format-btn {
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 14px;
            color: var(--text-muted);
            background: none;
            cursor: pointer;
        }
        .format-btn:hover {
            background: var(--primary-light);
            color: var(--primary);
        }
        .editor-body {
            flex-grow: 1;
            padding: 40px 60px;
            overflow-y: auto;
        }
        .editor-title-input {
            width: 100%;
            font-size: 32px;
            font-weight: 700;
            border: none;
            background: none;
            margin-bottom: 20px;
        }
        .editor-content {
            min-height: 60vh;
            font-size: 16px;
            line-height: 1.7;
            color: #334155;
            outline: none;
        }
        .editor-content img {
            max-width: 100%;
            border-radius: 8px;
            margin: 10px 0;
            border: 1px solid var(--border);
        }
        .editor-tags-input {
            width: 100%;
            border: none;
            font-size: 13px;
            color: var(--primary);
            background: transparent;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px dashed var(--border);
        }
        .mobile-back, .mobile-menu-btn { display: none; }

        @media (max-width: 900px) {
            .sidebar {
                position: fixed;
                left: -100%;
                height: 100%;
                transition: 0.3s;
                box-shadow: var(--shadow-md);
                background: white;
            }
            .sidebar.open { left: 0; }
            .list-pane { width: 100%; }
            .editor-pane {
                position: fixed;
                top: 0;
                left: 100%;
                width: 100%;
                height: 100%;
                transition: 0.3s;
                z-index: 20;
                background: white;
            }
            .editor-pane.open { left: 0; }
            .mobile-back, .mobile-menu-btn { display: flex; margin-right: 10px; }
            .editor-body { padding: 20px; }
            .editor-title-input { font-size: 24px; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <!-- Sidebar -->
    <nav class="sidebar" id="sidebar">
        <div class="logo"><i class="fa-solid fa-feather"></i> AeroNote</div>
        <div class="nav-label">Menu</div>
        <button class="nav-item active" data-filter="all" onclick="setFilter('all', this)"><i class="fa-solid fa-layer-group"></i> All Notes</button>
        <button class="nav-item" data-filter="pinned" onclick="setFilter('pinned', this)"><i class="fa-solid fa-thumbtack"></i> Pinned</button>
        <button class="nav-item" data-filter="favorites" onclick="setFilter('favorites', this)"><i class="fa-solid fa-heart"></i> Favorites</button>
        <div class="nav-label">Organization</div>
        <button class="nav-item" data-filter="work" onclick="setFilter('work', this)"><i class="fa-solid fa-briefcase"></i> Work</button>
        <button class="nav-item" data-filter="personal" onclick="setFilter('personal', this)"><i class="fa-solid fa-user"></i> Personal</button>

        <div class="sidebar-spacer"></div>
        <div class="backup-btns">
            <div class="backup-btn" onclick="exportAllAsTxt()"><i class="fa-solid fa-file-lines"></i> TXT Backup</div>
            <div class="backup-btn" onclick="triggerImport()"><i class="fa-solid fa-upload"></i> Restore TXT</div>
        </div>
        <input type="file" id="importFile" accept=".txt" style="display:none;" onchange="importFromTxt(event)">
        <a href="https://t.me/TechCommunitys" target="_blank" class="nav-item telegram-btn" style="margin-top: 12px; background:#F8FAFC; border:1px dashed #0088cc; color:#0088cc; justify-content:center;"><i class="fa-brands fa-telegram"></i> Telegram Channel</a>
    </nav>

    <!-- List Pane -->
    <div class="list-pane">
        <div class="list-header">
            <div class="list-title-row">
                <div style="display:flex; align-items:center;">
                    <button class="mobile-menu-btn action-btn" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
                    <span class="list-title" id="listTitle">All Notes</span>
                </div>
                <button class="create-btn" onclick="createNewNote()"><i class="fa-solid fa-plus"></i></button>
            </div>
            <div class="search-box">
                <i class="fa-solid fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search notes..." oninput="renderNotes()">
            </div>
        </div>
        <div class="notes-list" id="notesList"></div>
    </div>

    <!-- Editor Pane -->
    <div class="editor-pane" id="editorPane">
        <div class="blank-state" id="blankState">
            <i class="fa-regular fa-file-lines"></i>
            <h2>Select a note to view</h2>
            <p>Or create a new note to start capturing your ideas.</p>
            <button class="blank-state-btn" onclick="createNewNote()">Create New Note</button>
        </div>
        <div class="editor-header">
            <div style="display:flex; align-items:center;">
                <button class="mobile-back action-btn" onclick="closeEditorMobile()"><i class="fa-solid fa-arrow-left"></i></button>
                <div class="editor-actions">
                    <button class="action-btn" id="btnPin" onclick="toggleActiveNoteProp('isPinned')"><i class="fa-solid fa-thumbtack"></i></button>
                    <button class="action-btn" id="btnFav" onclick="toggleActiveNoteProp('isFavorite')"><i class="fa-solid fa-heart"></i></button>
                    <button class="action-btn" onclick="downloadSingleNoteTxt()"><i class="fa-solid fa-download"></i></button>
                    <button class="action-btn" onclick="deleteActiveNote()" style="color:var(--danger);"><i class="fa-solid fa-trash"></i></button>
                </div>
            </div>
            <div class="sync-status" id="syncStatus"><i class="fa-solid fa-cloud-check"></i> Saved</div>
        </div>
        <div class="format-toolbar">
            <button class="format-btn" onclick="formatText('bold')"><i class="fa-solid fa-bold"></i></button>
            <button class="format-btn" onclick="formatText('italic')"><i class="fa-solid fa-italic"></i></button>
            <button class="format-btn" onclick="formatText('underline')"><i class="fa-solid fa-underline"></i></button>
            <button class="format-btn" onclick="formatText('formatBlock', 'H1')">H1</button>
            <button class="format-btn" onclick="formatText('formatBlock', 'H2')">H2</button>
            <button class="format-btn" onclick="formatText('insertUnorderedList')"><i class="fa-solid fa-list-ul"></i></button>
            <button class="format-btn" onclick="formatText('insertOrderedList')"><i class="fa-solid fa-list-ol"></i></button>
            <button class="format-btn" onclick="triggerImageUpload()"><i class="fa-regular fa-image"></i></button>
            <input type="file" id="imageUploadInput" accept="image/*" style="display:none;" onchange="handleImageUpload(event)">
            <button class="format-btn" onclick="insertLinkPrompt()"><i class="fa-solid fa-link"></i></button>
        </div>
        <div class="editor-body">
            <input type="text" id="editorTitle" class="editor-title-input" placeholder="Note Title">
            <div id="editorContent" class="editor-content" contenteditable="true" placeholder="Start typing here..."></div>
            <input type="text" id="editorTags" class="editor-tags-input" placeholder="# Add tags separated by comma (e.g. work, ideas)">
        </div>
    </div>
</div>

<script>
    // No login – everything is stored locally under a fixed key
    let notes = [];
    let activeNoteId = null;
    let currentFilter = 'all';
    let typingTimer;
    const typingDelay = 800;

    const STORAGE_KEY = 'aeronote_notes';

    function loadNotes() {
        const stored = localStorage.getItem(STORAGE_KEY);
        if(stored) {
            notes = JSON.parse(stored);
        } else {
            notes = [{
                id: Date.now().toString(),
                title: "Welcome to AeroNote! 🚀",
                content: "<p><strong>Your ultimate simple workspace</strong><br>✅ Rich text & images<br>✅ Pin & favorite notes<br>✅ Search & filters<br>✅ TXT backup & restore<br>✅ Auto-save</p>",
                tags: "welcome",
                isPinned: true,
                isFavorite: true,
                updatedAt: Date.now()
            }];
            saveNotes();
        }
        renderNotes();
        if(notes.length) openNote(notes[0].id);
        else document.getElementById('blankState').style.display = 'flex';
    }

    function saveNotes() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
    }

    function renderNotes() {
        const notesListEl = document.getElementById('notesList');
        const query = document.getElementById('searchInput').value.toLowerCase();
        notesListEl.innerHTML = '';
        let filtered = notes.filter(n => {
            const match = n.title.toLowerCase().includes(query) || n.content.toLowerCase().includes(query) || n.tags.toLowerCase().includes(query);
            if(!match) return false;
            if(currentFilter === 'pinned') return n.isPinned;
            if(currentFilter === 'favorites') return n.isFavorite;
            if(currentFilter === 'work') return n.tags.toLowerCase().includes('work');
            if(currentFilter === 'personal') return n.tags.toLowerCase().includes('personal');
            return true;
        });
        filtered.sort((a,b) => (b.isPinned - a.isPinned) || (b.updatedAt - a.updatedAt));
        if(filtered.length === 0) {
            notesListEl.innerHTML = `<div style="text-align:center; padding:20px; color:var(--text-muted);">No notes found.</div>`;
            return;
        }
        filtered.forEach(note => {
            const div = document.createElement('div');
            div.className = `note-card ${note.id === activeNoteId ? 'selected' : ''}`;
            div.onclick = () => openNote(note.id);
            const temp = document.createElement('div'); temp.innerHTML = note.content;
            const preview = temp.textContent || temp.innerText || "No content";
            const date = new Date(note.updatedAt).toLocaleDateString(undefined, { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
            div.innerHTML = `
                ${note.isPinned ? '<i class="fa-solid fa-thumbtack pin-indicator"></i>' : ''}
                <div class="note-card-title">${escapeHtml(note.title) || 'Untitled'}</div>
                <div class="note-card-preview">${preview.substring(0,80)}</div>
                <div class="note-card-meta">${date}</div>
            `;
            notesListEl.appendChild(div);
        });
    }

    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

    function createNewNote() {
        const newNote = { id: Date.now().toString(), title: "", content: "", tags: "", isPinned: false, isFavorite: false, updatedAt: Date.now() };
        notes.unshift(newNote);
        saveNotes();
        openNote(newNote.id);
        document.getElementById('editorTitle').focus();
    }

    function openNote(id) {
        activeNoteId = id;
        const note = notes.find(n => n.id === id);
        if(!note) return;
        document.getElementById('blankState').style.display = 'none';
        document.getElementById('editorTitle').value = note.title;
        document.getElementById('editorContent').innerHTML = note.content;
        document.getElementById('editorTags').value = note.tags;
        document.getElementById('btnPin').className = `action-btn ${note.isPinned ? 'active' : ''}`;
        document.getElementById('btnFav').className = `action-btn ${note.isFavorite ? 'active' : ''}`;
        renderNotes();
        if(window.innerWidth <= 900) document.getElementById('editorPane').classList.add('open');
    }

    function saveActiveNoteData() {
        if(!activeNoteId) return;
        const idx = notes.findIndex(n => n.id === activeNoteId);
        if(idx === -1) return;
        notes[idx].title = document.getElementById('editorTitle').value;
        notes[idx].content = document.getElementById('editorContent').innerHTML;
        notes[idx].tags = document.getElementById('editorTags').value;
        notes[idx].updatedAt = Date.now();
        saveNotes();
        document.getElementById('syncStatus').innerHTML = '<i class="fa-solid fa-cloud-check"></i> Saved';
        setTimeout(() => { if(document.getElementById('syncStatus')) document.getElementById('syncStatus').innerHTML = '<i class="fa-solid fa-cloud-check"></i> Synced'; }, 1500);
        renderNotes();
    }

    function setupAutoSave() {
        const fields = ['editorTitle', 'editorContent', 'editorTags'];
        fields.forEach(id => {
            const el = document.getElementById(id);
            if(el) el.addEventListener('input', () => {
                if(!activeNoteId) return;
                clearTimeout(typingTimer);
                typingTimer = setTimeout(saveActiveNoteData, typingDelay);
            });
        });
    }

    function toggleActiveNoteProp(prop) {
        if(!activeNoteId) return;
        const note = notes.find(n => n.id === activeNoteId);
        note[prop] = !note[prop];
        note.updatedAt = Date.now();
        saveNotes();
        openNote(activeNoteId);
    }

    function deleteActiveNote() {
        if(!activeNoteId || !confirm("Delete this note permanently?")) return;
        notes = notes.filter(n => n.id !== activeNoteId);
        saveNotes();
        activeNoteId = null;
        document.getElementById('blankState').style.display = 'flex';
        renderNotes();
        if(window.innerWidth <= 900) closeEditorMobile();
    }

    function setFilter(filter, btn) {
        currentFilter = filter;
        document.querySelectorAll('.sidebar .nav-item').forEach(el => el.classList.remove('active'));
        if(btn) btn.classList.add('active');
        const titles = { all:'All Notes', pinned:'Pinned Notes', favorites:'Favorites', work:'Work Notes', personal:'Personal Notes' };
        document.getElementById('listTitle').innerText = titles[filter] || 'Notes';
        renderNotes();
        if(window.innerWidth <= 900) toggleSidebar();
    }

    function formatText(cmd, val=null) {
        const editor = document.getElementById('editorContent');
        editor.focus();
        try {
            document.execCommand(cmd, false, val);
        } catch(e) {
            console.warn('Format command not supported:', cmd);
        }
        clearTimeout(typingTimer);
        typingTimer = setTimeout(saveActiveNoteData, typingDelay);
    }

    function insertLinkPrompt() { let url = prompt("Enter URL:"); if(url) formatText('createLink', url); }
    function triggerImageUpload() { document.getElementById('imageUploadInput').click(); }
    function handleImageUpload(e) {
        const file = e.target.files[0];
        if(file) {
            const reader = new FileReader();
            reader.onload = ev => formatText('insertImage', ev.target.result);
            reader.readAsDataURL(file);
        }
        e.target.value = '';
    }

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
    function closeEditorMobile() { document.getElementById('editorPane').classList.remove('open'); activeNoteId = null; renderNotes(); }

    // TXT Backup & Restore
    function stripHtml(html) { let d = document.createElement('div'); d.innerHTML = html; return d.textContent || d.innerText || ''; }
    function exportAllAsTxt() {
        const content = notes.map(n => `===== ${n.title} =====\nDate: ${new Date(n.updatedAt).toLocaleString()}\nTags: ${n.tags}\nPinned: ${n.isPinned} | Favorite: ${n.isFavorite}\n\n${stripHtml(n.content)}\n\n`).join('\n---\n\n');
        const blob = new Blob([content], {type: 'text/plain'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `AeroNote_backup.txt`;
        a.click();
        URL.revokeObjectURL(a.href);
        alert("All notes exported as .txt file.");
    }
    function downloadSingleNoteTxt() {
        if(!activeNoteId) return;
        const note = notes.find(n => n.id === activeNoteId);
        const content = `Title: ${note.title}\nDate: ${new Date(note.updatedAt).toLocaleString()}\nTags: ${note.tags}\nPinned: ${note.isPinned} | Favorite: ${note.isFavorite}\n\nContent:\n${stripHtml(note.content)}`;
        const blob = new Blob([content], {type: 'text/plain'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `note_${note.title.replace(/[^a-z0-9]/gi, '_')}.txt`;
        a.click();
        URL.revokeObjectURL(a.href);
        alert("Single note downloaded as .txt");
    }
    function triggerImport() { document.getElementById('importFile').click(); }
    function importFromTxt(event) {
        const file = event.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const text = e.target.result;
            const rawNotes = text.split(/\n---\n/);
            let imported = [];
            for(let block of rawNotes) {
                const titleMatch = block.match(/^===== (.*?) =====/);
                if(titleMatch) {
                    const title = titleMatch[1];
                    const tagsMatch = block.match(/Tags: (.*?)\n/);
                    const pinnedMatch = block.match(/Pinned: (true|false)/);
                    const favMatch = block.match(/Favorite: (true|false)/);
                    let content = block.replace(/^=====.*?=====\n.*?\n\n/, '').trim();
                    imported.push({
                        id: Date.now() + Math.random(),
                        title: title,
                        content: content.replace(/\n/g, '<br>'),
                        tags: tagsMatch ? tagsMatch[1] : '',
                        isPinned: pinnedMatch ? pinnedMatch[1] === 'true' : false,
                        isFavorite: favMatch ? favMatch[1] === 'true' : false,
                        updatedAt: Date.now()
                    });
                }
            }
            if(imported.length) {
                notes = [...imported, ...notes];
                saveNotes();
                renderNotes();
                alert(`Imported ${imported.length} notes from .txt`);
            } else alert("Invalid .txt format or no notes found.");
        };
        reader.readAsText(file);
        event.target.value = '';
    }

    window.onload = () => {
        loadNotes();
        setupAutoSave();
    };
</script>
</body>
</html>
